<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Financeiro Formatura (v3.0 - MySQL)</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
:root {
    --bg: #050505;
    --card-bg: rgba(20, 20, 20, 0.7);
    --border: rgba(255, 255, 255, 0.1);
    --text: #e4e4e7;
    --green: #00e676;
    --red: #ff1744;
    --blue: #2979ff;
    --purple: #d500f9;
}

* { box-sizing: border-box; font-family: 'Inter', sans-serif; outline: none; -webkit-tap-highlight-color: transparent; }

input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}

input[type=number] {
    -moz-appearance: textfield;
}

body {
    background-color: var(--bg); color: var(--text); margin: 0; padding: 0;
    min-height: 100vh; display: flex; flex-direction: column;
    position: relative;
}

body::before {
    content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background-image: url('logo.png');
    background-position: center; background-repeat: no-repeat; background-size: 70%;
    opacity: 0.10; z-index: -1; pointer-events: none;
}

#login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; }
.split-side { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; text-align: center; border: 1px solid #111; position: relative; transition: background 0.3s; }
.split-side:hover { background: #111; }
.split-side i { font-size: 3.5rem; margin-bottom: 25px; }
.split-title { font-size: 1.5rem; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; }

#form-login-container { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #18181b; border: 1px solid #333; padding: 35px; border-radius: 20px; width: 90%; max-width: 350px; box-shadow: 0 25px 60px rgba(0,0,0,0.9); z-index: 10000; }

.app-container { max-width: 1200px; margin: 0 auto; padding: 25px; width: 100%; display: none; }
header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; border-bottom: 1px solid var(--border); padding-bottom: 25px; }

.main-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; margin-bottom: 25px; }
.card { background: var(--card-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 24px; padding: 30px; position: relative; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4); transition: transform 0.2s ease; }
.card:hover { transform: translateY(-5px); }

.big-number { font-size: 3rem; font-weight: 800; margin: 10px 0; letter-spacing: -1.5px; }
.label { font-size: 0.8rem; text-transform: uppercase; color: #888; font-weight: 600; letter-spacing: 1.5px; }
.chart-container { position: relative; height: 280px; width: 100%; margin-top: 20px; }

.input-group { background: rgba(255,255,255,0.04); border-radius: 14px; padding: 12px; margin-bottom: 15px; border: 1px solid transparent; display: flex; flex-direction: column; gap: 8px; transition: border-color 0.3s; }
.input-group:focus-within { border-color: rgba(255,255,255,0.2); }
.input-row { display: flex; gap: 12px; align-items: center; }
input { background: transparent; border: none; color: #fff; font-size: 1.1rem; width: 100%; padding: 10px; font-weight: 600; }

button { border: none; padding: 14px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 0.85rem; white-space: nowrap; transition: opacity 0.2s, transform 0.1s; }
button:active { transform: scale(0.96); }
button:hover { opacity: 0.85; }
.btn-verde { background: rgba(0, 230, 118, 0.18); color: var(--green); border: 1px solid var(--green); }
.btn-vermelho { background: rgba(255, 23, 68, 0.18); color: var(--red); border: 1px solid var(--red); }
.btn-login { width: 100%; background: var(--blue); color: white; padding: 15px; margin-top: 15px; font-size: 1rem; }
.btn-roxo { background: rgba(156, 39, 176, 0.18); color: var(--purple); border: 1px solid var(--purple);}

.txt-verde { color: var(--green); }
.txt-vermelho { color: var(--red); }
.txt-roxo { color: var(--purple); }
.admin-only { display: none; }

table { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin-top: 20px; }
td { padding: 15px 8px; border-bottom: 1px solid rgba(255,255,255,0.06); color: #ccc; }
</style>
</head>
<body>

<div id="login-overlay">
    <div class="split-side" onclick="entrarComo('ESTUDANTE')">
        <i class="fas fa-user-graduate" style="color: var(--blue)"></i>
        <div class="split-title">Estudante</div>
    </div>
    <div class="split-side" style="background: #080808;" onclick="mostrarFormLogin()">
        <i class="fas fa-user-shield txt-roxo"></i>
        <div class="split-title">Comissão</div>
    </div>
</div>

<div id="form-login-container">
    <h3 style="text-align: center; margin-top: 0; font-weight: 800; letter-spacing: 1px;">Acesso Local</h3>
    <div class="input-group">
        <input type="text" id="login-user" placeholder="Usuário (admin)">
    </div>
    <div class="input-group">
        <input type="password" id="login-pass" placeholder="Senha" onkeydown="verificarEnter(event)">
    </div>
    <button class="btn-login" onclick="fazerLogin()">Entrar</button>
    <button style="background:transparent; color:#666; width:100%; margin-top:15px; font-size: 0.8rem;" onclick="cancelarLogin()">Cancelar</button>
</div>

<div class="app-container" id="app">
    <header>
        <div>
            <h1 style="margin:0; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 300;">Financeiro <span style="font-weight: 800;" class="txt-roxo">3º Info</span></h1>
            <span id="badge-user" style="font-size: 0.75rem; background: #222; padding: 4px 10px; border-radius: 6px; color: #aaa; font-weight: 600;">MySQL Conectado</span>
        </div>
        <button onclick="sair()" style="background: rgba(255,255,255,0.08); color: #fff; padding: 12px 18px; width: auto;"><i class="fas fa-power-off"></i></button>
    </header>

    <div class="main-grid">
        <div class="card">
            <div class="label">Caixa</div>
            <div class="big-number txt-verde" id="saldo">R$ 0,00</div>
            <div style="margin-top: 20px;">
                <div class="label">Lucro Açaí</div>
                <div class="txt-roxo" style="font-weight: 800; font-size: 1.4rem;" id="lucro-acai">R$ 0,00</div>
            </div>

            <div class="admin-only" style="margin-top: 25px; border-top: 1px solid var(--border); padding-top: 20px;">
                <div class="input-group">
                    <div style="display:flex; justify-content:space-between; width:100%; align-items: center;">
                        <span class="label" style="color:#aaa">Aporte</span>
                        <input type="date" id="data-aporte">
                    </div>
                    <div class="input-row">
                        <input type="number" id="valor-aporte" placeholder="R$ Valor">
                        <button class="btn-verde" style="width: auto; padding: 12px;" onclick="lancarGenerico('SALDO_INICIAL', 'valor-aporte', 'Aporte', 'data-aporte')"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="label" style="text-align: center;">Projeção</div>
            <div class="chart-container">
                <canvas id="graficoEvolucao"></canvas>
            </div>
        </div>
    </div>

    <div class="main-grid admin-only">
        <div class="card">
            <h3 class="txt-verde" style="margin:0 0 15px 0; font-size:1.1rem; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 15px;">
                <i class="fas fa-cash-register"></i> Vendas
            </h3>
            
            <div class="input-group">
                <div class="input-row" style="justify-content: space-between;">
                    <span>Trufa <small>(R$ 2,50)</small></span>
                    <input type="date" id="data-trufa" style="width:130px">
                </div>
                <div class="input-row">
                    <input type="number" id="qtd-trufa" placeholder="Quantidade">
                    <button class="btn-verde" onclick="venderQtd('TRUFA', 2.50, 'qtd-trufa', 'data-trufa')">Vender</button>
                </div>
            </div>

            <div class="input-group">
                <div class="input-row" style="justify-content: space-between;">
                    <span>Bolo <small>(R$ 3,50)</small></span>
                    <input type="date" id="data-bolo" style="width:130px">
                </div>
                <div class="input-row">
                    <input type="number" id="qtd-bolo" placeholder="Quantidade">
                    <button class="btn-verde" onclick="venderQtd('BOLO', 3.50, 'qtd-bolo', 'data-bolo')">Vender</button>
                </div>
            </div>

            <div class="input-group" style="border: 1px solid rgba(213, 0, 249, 0.3);">
                <div class="input-row" style="justify-content: space-between;">
                    <span class="txt-roxo">Venda Açaí / Outros</span>
                    <input type="date" id="data-acai" style="width:130px">
                </div>
                <div class="input-row">
                    <input type="number" id="valor-acai" placeholder="R$ Valor Livre">
                    <button class="btn-roxo" style="border-color:var(--purple); color:var(--purple)" onclick="lancarGenerico('ACAI', 'valor-acai', 'Venda Açaí', 'data-acai')">Vender</button>
                </div>
            </div>
        </div>

        <div class="card">
            <h3 class="txt-vermelho" style="margin:0 0 15px 0; font-size:1.1rem; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 15px;">
                <i class="fas fa-shopping-cart"></i> Gastos (Saída)
            </h3>

            <div class="input-group">
                <div class="input-row" style="justify-content: space-between;">
                    <span>Repor Trufas <small style="color:var(--red)">(- R$ 1,50)</small></span>
                    <input type="date" id="data-trufa-compra" style="width:130px">
                </div>
                <div class="input-row">
                    <input type="number" id="qtd-trufa-compra" placeholder="Qtd Comprada">
                    <button class="btn-vermelho" onclick="lancarGastoQtd('TRUFA_COMPRA', 1.50, 'qtd-trufa-compra', 'data-trufa-compra')">Pagar</button>
                </div>
            </div>

            <div class="input-group">
				<div class="input-row" style="justify-content: space-between;">
                    <span>Repor Bolos <small style="color:var(--red)">(- R$ 2,50)</small></span>
                    <input type="date" id="data-bolo-compra" style="width:130px">
                </div>
                <div class="input-row">
                    <input type="number" id="qtd-bolo-compra" placeholder="Qtd Comprada">
                    <button class="btn-vermelho" onclick="lancarGastoQtd('BOLO_COMPRA', 2.50, 'qtd-bolo-compra', 'data-bolo-compra')">Pagar</button>
                </div>
            </div>

            <div class="input-group">
                <div class="input-row" style="justify-content: space-between;">
                    <span>Outras Despesas</span>
                    <input type="date" id="data-outros" style="width:130px">
                </div>
                <input type="text" id="desc-outros" placeholder="Descrição do gasto" style="background:rgba(0,0,0,0.3); border:none; padding:8px; color:#fff; border-radius:6px; margin:5px 0;">
                <div class="input-row">
                    <input type="number" id="valor-outros" placeholder="R$ Valor Gasto">
                    <button class="btn-vermelho" onclick="lancarGastoGenerico()">Lançar Gasto</button>
                </div>
            </div>
        </div>
    </div>

    <div class="card" style="margin-top: 10px;">
        <div class="label">Histórico</div>
        <div style="overflow-x: auto;">
            <table id="tabela-historico"></table>
        </div>
    </div>

    <div class="card admin-only" style="border: 1px solid var(--red); background: rgba(255, 23, 68, 0.05); margin-top: 25px;">
        <div class="label" style="color: var(--red); margin-bottom: 10px; font-weight: 800;">APAGAR DADOS</div>
        <button class="btn-vermelho" style="width: 100%; background: var(--red); color: white;" onclick="resetarBanco()">
            <i class="fas fa-trash"></i> RESET
        </button>
    </div>

</div>

<script>
const API_URL = "/api/vendas";
let chartInstance = null;

window.onload = () => {
    const hoje = new Date().toISOString().split('T')[0];
    document.querySelectorAll('input[type="date"]').forEach(el => el.value = hoje);
    const usuarioLogado = localStorage.getItem("usuario_logado");
    if(usuarioLogado === "ADMIN") iniciarSistema(true);
    else if(usuarioLogado === "ESTUDANTE") iniciarSistema(false);
};

async function carregarDados() {
    try {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error('Servidor offline');
        const data = await response.json();

        const saldo = data.reduce((acc, i) => acc + i.valor, 0);
        const lucroAcai = data.filter(i => i.tipo === 'ACAI').reduce((acc, i) => acc + i.valor, 0);

        document.getElementById('saldo').innerText = fmtMoeda(saldo);
        document.getElementById('lucro-acai').innerText = fmtMoeda(lucroAcai);

        renderizarHistorico(data);
        renderizarGrafico(data);
    } catch (error) {
        console.error(error);
        Swal.fire({icon:'error', title:'Erro', text:'O Java está rodando?', background:'#222', color:'#fff'});
    }
}

async function enviarLancamento(payload) {
    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        if (response.ok) {
            carregarDados();
            Swal.fire({toast: true, position: 'top-end', icon: 'success', title: 'Salvo no MySQL!', showConfirmButton: false, timer: 1500});
        }
    } catch (error) {
        erro("Erro ao conectar com o Java.");
    }
}

async function resetarBanco() {
    Swal.fire({
        title: 'Apagar?',
        text: "Vai apagar TODOS os dados do BD",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#8A00C4',
        cancelButtonColor: '#3085d6',
        confirmButtonText: 'Sim',
        background: '#222',
        color: '#fff'
    }).then(async (result) => {
        if (result.isConfirmed) {
            try {
                const response = await fetch(API_URL, { method: 'DELETE' });
                
                if (response.ok) {
                    Swal.fire({title: 'Apagado!', text: 'Banco de dados reiniciado.', icon: 'success', background:'#222', color:'#fff'});
                    carregarDados();
                } else {
                    erro("Erro ao tentar resetar o banco.");
                }
            } catch (e) {
                erro("Erro de conexão.");
            }
        }
    })
}

function mostrarFormLogin() { document.getElementById('login-overlay').style.display = 'none'; document.getElementById('form-login-container').style.display = 'block'; document.getElementById('login-user').focus(); }
function cancelarLogin() { document.getElementById('form-login-container').style.display = 'none'; document.getElementById('login-overlay').style.display = 'flex'; }
function verificarEnter(event) { if (event.key === 'Enter') fazerLogin(); }
function entrarComo(tipo) { localStorage.setItem("usuario_logado", "ESTUDANTE"); iniciarSistema(false); }

function fazerLogin() {
    const u = document.getElementById('login-user').value;
    const p = document.getElementById('login-pass').value;
    if(u === 'admin' && p === 'admin') {
        localStorage.setItem("usuario_logado", "ADMIN");
        iniciarSistema(true);
    } else {
        Swal.fire({icon:'error', title:'Erro', text:'admin / admin', background:'#222'});
    }
}

function iniciarSistema(isAdmin) {
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('form-login-container').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    if(isAdmin) document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
    carregarDados();
}

function sair() { localStorage.removeItem("usuario_logado"); location.reload(); }

function venderQtd(tipo, preco, idQtd, idData) {
    const qtd = document.getElementById(idQtd).value;
    const data = document.getElementById(idData).value;
    if(!qtd || qtd <= 0) return erro("Qtd inválida");
    enviarLancamento({ tipo, descricao: `Venda ${qtd}x ${tipo}`, valor: (qtd * preco), dataLancamento: data });
    document.getElementById(idQtd).value = '';
}

function lancarGastoQtd(tipo, custo, idQtd, idData) {
    const qtd = document.getElementById(idQtd).value;
    const data = document.getElementById(idData).value;
    if(!qtd || qtd <= 0) return erro("Qtd inválida");
    enviarLancamento({ tipo, descricao: `Compra Estoque ${qtd}x`, valor: -(qtd * custo), dataLancamento: data });
    document.getElementById(idQtd).value = '';
}

function lancarGenerico(tipo, idValor, desc, idData) {
    const val = document.getElementById(idValor).value;
    const data = document.getElementById(idData).value;
    if(!val || val <= 0) return erro("Valor inválido");
    enviarLancamento({ tipo, descricao: desc, valor: parseFloat(val), dataLancamento: data });
    document.getElementById(idValor).value = '';
}

function lancarGastoGenerico() {
    const val = document.getElementById('valor-outros').value;
    const desc = document.getElementById('desc-outros').value || 'Despesa';
    const data = document.getElementById('data-outros').value;
    if(!val || val <= 0) return erro("Valor inválido");
    enviarLancamento({ tipo: 'OUTROS', descricao: desc, valor: -Math.abs(val), dataLancamento: data });
    document.getElementById('valor-outros').value = '';
    document.getElementById('desc-outros').value = '';
}

function renderizarHistorico(lista) {
    const tb = document.getElementById('tabela-historico');
    tb.innerHTML = '';
    [...lista].reverse().slice(0, 15).forEach(i => {
        const isPos = i.valor >= 0;
        const dataFmt = i.dataLancamento ? i.dataLancamento.split('-').reverse().join('/') : '--';
        tb.innerHTML += `<tr>
            <td style="width:40px;text-align:center"><i class="fas ${isPos ? 'fa-arrow-up txt-verde' : 'fa-arrow-down txt-vermelho'}"></i></td>
            <td style="font-weight:600">${i.descricao}</td>
            <td style="text-align:right;opacity:0.5">${dataFmt}</td>
            <td style="text-align:right;font-weight:800" class="${isPos ? 'txt-verde' : 'txt-vermelho'}">${fmtMoeda(i.valor)}</td>
        </tr>`;
    });
}

function renderizarGrafico(historico) {
    const ctx = document.getElementById('graficoEvolucao').getContext('2d');
    const ordenado = [...historico].sort((a,b) => a.dataLancamento > b.dataLancamento ? 1 : -1);
    let soma = 0;
    const labels = ordenado.map(i => i.dataLancamento.split('-').reverse().join('/'));
    const dados = ordenado.map(i => { soma += i.valor; return soma; });

    if(chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                data: dados, borderColor: '#00e676', backgroundColor: 'rgba(0, 230, 118, 0.1)',
                fill: true, tension: 0.4, borderWidth: 3, pointRadius: 2
            }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
}

function fmtMoeda(val) { return new Intl.NumberFormat('pt-BR', {style:'currency', currency:'BRL'}).format(val); }
function erro(msg) { Swal.fire({icon:'warning', title:'Ops', text:msg, background:'#222', color:'#fff', toast:true, position:'top-end', showConfirmButton:false, timer:2000}); }
</script>

</body>
</html>
